<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sep Cafe – Loyalty Card</title>
  <link rel="stylesheet" href="css/style.css" />
  <link class="fav" rel="shortcut icon" href="/sep_profile.png" type="image/x-icon">
</head>
<body>

<div class="page">
  <div class="container">

    <header class="site-header">
      <div class="logo-ar">سبتمبر</div>
      <div class="logo-sub">Loyalty Card</div>
    </header>

    <!-- ── Screen 1: Phone entry ── -->
    <div class="screen active" id="s-phone">
      <p class="screen-title">Welcome back</p>
      <p class="screen-sub">Sign in with Google.</p>

      <!-- Google Sign-In button -->
      <button class="btn btn-google" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <!-- Divider -->
      <!-- <div class="divider">
        <span>or use phone number</span>
      </div> -->

      <!-- <div class="form-group">
        <label class="form-label" for="phone-input">Phone number</label>
        <input
          class="form-input"
          id="phone-input"
          type="tel"
          placeholder="+968 9X XXX XXXX"
          autocomplete="tel"
        />
      </div> -->

      <!-- <div class="alert alert-error" id="phone-error"></div>

      <div id="recaptcha-container"></div><br>
      <button class="btn btn-primary" id="send-otp-btn">
        Send SMS Code
      </button>
    </div> -->

    <!-- ── Screen 2: OTP verify ── -->
    <div class="screen" id="s-otp">
      <span class="back-link" id="back-to-phone">← Back</span>
      <p class="screen-title">Check SMS</p>
      <p class="screen-sub">
        We sent a 6-digit code to <strong id="otp-phone-display"></strong>.
        Enter it below.
      </p>

      <div class="otp-row">
        <input class="otp-input" id="o1" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" />
        <input class="otp-input" id="o2" type="text" inputmode="numeric" maxlength="1" />
        <input class="otp-input" id="o3" type="text" inputmode="numeric" maxlength="1" />
        <input class="otp-input" id="o4" type="text" inputmode="numeric" maxlength="1" />
        <input class="otp-input" id="o5" type="text" inputmode="numeric" maxlength="1" />
        <input class="otp-input" id="o6" type="text" inputmode="numeric" maxlength="1" />
      </div>

      <div class="alert alert-error" id="otp-error"></div>

      <button class="btn btn-primary" id="verify-btn">Verify</button>
      <button class="btn btn-ghost" id="back-to-phone-btn" onclick="document.getElementById('back-to-phone').click()">
        Resend SMS
      </button>
    </div>

    <!-- ── Screen 3: Loyalty card ── -->
    <div class="screen" id="s-card">

      <div class="loyalty-card">
        <div class="card-header">
          <div class="card-brand-ar">سبتمبر</div>
          <div class="card-brand-en">cafe</div>
          <div class="card-customer" id="card-phone"></div>
        </div>

        <div class="circles-grid" id="circles-container"></div>

        <div class="card-progress">
          <div class="progress-track">
            <div class="progress-fill" id="c-progress-fill" style="width:0%"></div>
          </div>
          <div class="progress-text" id="c-progress-text">0 / 5 drinks</div>
        </div>

        <div class="card-footer-handle">@Sep.Cafe_Oman</div>
      </div>

      <div class="info-card">
        <div class="info-row">
          <span class="lbl">Account</span>
          <span class="val" id="info-phone">—</span>
        </div>
        <div class="info-row">
          <span class="lbl">Total drinks</span>
          <span class="val" id="info-total">0</span>
        </div>
        <div class="info-row">
          <span class="lbl">Free drinks earned</span>
          <span class="val" id="info-free">0</span>
        </div>
      </div>

      <p style="font-size:12px;color:#999;text-align:center;margin-bottom:1rem;">
        Show this screen to the barista after each purchase.
      </p>

      <button class="btn btn-ghost" id="logout-btn">Sign out</button>
    </div>

  </div>
</div>

<script type="module" src="js/customer.js"></script>
</body>
</html>
